name: Publish Library to npm

on:
  push:
    branches: [main]
    paths:
      - 'react-flowcase/**'
      - '!react-flowcase/package.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        default: false
        type: boolean
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run build -w react-flowcase

      - name: Typecheck
        run: npm run typecheck -w react-flowcase

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: npm publish -w react-flowcase --dry-run

      - name: Verify npm token
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Bump version
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        id: version
        working-directory: react-flowcase
        run: |
          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"
          npm version $BUMP_TYPE --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped to v${NEW_VERSION}"

      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: npm publish -w react-flowcase --access public

      - name: Commit and push version bump
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add react-flowcase/package.json
          git commit -m "chore: bump react-flowcase to v${{ steps.version.outputs.new_version }} [skip ci]"
          git push
